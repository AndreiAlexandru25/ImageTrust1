name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ==========================================================================
  # Build and Test
  # ==========================================================================
  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ==========================================================================
  # Build Windows Executable
  # ==========================================================================
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[desktop]"
          pip install pyinstaller>=6.0.0

      - name: Build executable
        run: python scripts/build_desktop.py
        continue-on-error: true

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/ImageTrust/
        if: success()

  # ==========================================================================
  # Create GitHub Release
  # ==========================================================================
  release:
    name: Create Release
    needs: [build, build-windows]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download Windows executable
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: windows-exe/
        continue-on-error: true

      - name: Create ZIP of Windows build
        run: |
          if [ -d "windows-exe" ]; then
            cd windows-exe && zip -r ../ImageTrust-windows-${{ github.ref_name }}.zip . && cd ..
          fi
        shell: bash
        continue-on-error: true

      - name: Get changelog entry
        id: changelog
        run: |
          # Extract changelog for this version
          VERSION=${{ github.ref_name }}
          echo "Extracting changelog for $VERSION"
          # Simple extraction (adjust based on your CHANGELOG format)
          BODY=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1 || echo "Release $VERSION")
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            ImageTrust-windows-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

