version: '3.8'

services:
  # ============================================
  # ImageTrust API Service
  # ============================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: imagetrust-api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data:ro
      - ../models:/app/models:ro
      - ../outputs:/app/outputs
      - ../reports:/app/reports
    environment:
      - IMAGETRUST_ENV=production
      - IMAGETRUST_LOG_LEVEL=INFO
      - IMAGETRUST_API_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - imagetrust-network

  # ============================================
  # ImageTrust Web UI Service
  # ============================================
  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: imagetrust-ui
    command: streamlit run src/imagetrust/frontend/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data:ro
      - ../models:/app/models:ro
      - ../outputs:/app/outputs
      - ../reports:/app/reports
    environment:
      - IMAGETRUST_ENV=production
      - IMAGETRUST_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - imagetrust-network

  # ============================================
  # GPU-enabled API (optional)
  # ============================================
  api-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    container_name: imagetrust-api-gpu
    ports:
      - "8002:8000"
    volumes:
      - ../data:/app/data:ro
      - ../models:/app/models:ro
      - ../outputs:/app/outputs
      - ../reports:/app/reports
    environment:
      - IMAGETRUST_ENV=production
      - IMAGETRUST_DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    restart: unless-stopped
    networks:
      - imagetrust-network

networks:
  imagetrust-network:
    driver: bridge

volumes:
  imagetrust-data:
  imagetrust-models:
  imagetrust-outputs:
