# ImageTrust Default Configuration
# =================================

# Project Settings
project_name: "ImageTrust"
project_version: "0.1.0"
environment: "development"  # development, testing, production

# Logging
log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
log_file: null  # Path to log file, null for stdout only

# Paths
data_dir: "./data"
models_dir: "./models"
outputs_dir: "./outputs"
reports_dir: "./reports"
temp_dir: "./tmp"

# Model Settings
detector:
  # Backbone architecture
  backbone: "convnext_base"  # efficientnet_b4, resnet50, vit_base_patch16_224, convnext_base
  pretrained: true
  checkpoint: null  # Path to custom checkpoint
  
  # Device settings
  device: null  # null for auto-detect, or "cuda", "cpu", "mps"
  
  # Confidence bounds
  min_confidence: 0.80
  max_confidence: 0.95
  
  # Ensemble settings
  ensemble:
    enabled: true
    strategy: "weighted"  # average, weighted, voting, stacking
    models:
      - "efficientnet_b4"
      - "convnext_base"
      - "vit_base_patch16_224"
    weights: [0.35, 0.35, 0.30]

# API Settings
api:
  host: "0.0.0.0"
  port: 8000
  reload: false
  max_upload_size_mb: 50
  cors_origins:
    - "*"
  rate_limit:
    enabled: true
    requests_per_minute: 60

# Frontend Settings
frontend:
  port: 8501
  theme: "dark"

# Preprocessing
preprocessing:
  input_size: 224
  mean: [0.485, 0.456, 0.406]  # ImageNet
  std: [0.229, 0.224, 0.225]   # ImageNet

# Explainability Settings
explainability:
  gradcam:
    enabled: true
    target_layer: null  # null for auto-detect, or specify layer name
  
  patch_analysis:
    enabled: true
    patch_size: 64
    stride: 32
  
  frequency:
    enabled: true

# Evaluation Settings
evaluation:
  # Cross-generator testing
  cross_generator:
    enabled: true
    generators:
      - "midjourney"
      - "dalle3"
      - "stable_diffusion_xl"
      - "adobe_firefly"
  
  # Degradation robustness
  degradation:
    jpeg_qualities: [95, 85, 70, 50]
    resize_factors: [1.0, 0.75, 0.5]
    blur_radii: [0, 0.5, 1.0, 2.0]
    noise_levels: [0, 0.01, 0.03, 0.05]

# Calibration Settings
calibration:
  method: "temperature"  # temperature, platt, isotonic
  min_samples: 500
  n_bins: 15

# Reporting Settings
reporting:
  default_format: "pdf"  # pdf, html, json
  include_heatmap: true
  include_patches: true
  include_metadata: true
  include_provenance: true
  company_logo: null
  footer_text: "Generated by ImageTrust"
